<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的課表</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
    }

    .controls,
    .semester-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    button,
    select {
      border: none;
      background: #3b82f6;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
    }

    button:hover,
    select:hover {
      background: #2563eb;
    }

    .delete-btn {
      background: #ef4444;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .secondary-btn {
      background: #64748b;
    }

    .secondary-btn:hover {
      background: #475569;
    }

    .semester-bar {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 16px;
      margin-bottom: 20px;
    }

    .semester-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      border: 1px solid #d9dfeb;
      text-align: center;
      padding: 10px;
      vertical-align: middle;
    }

    th {
      background: #eaf1ff;
      font-weight: 700;
    }

    .time-col {
      background: #f3f6fc;
      font-weight: 600;
      width: 120px;
      line-height: 1.5;
    }

    .course-cell {
      height: 90px;
      background: #fcfdff;
      transition: 0.2s;
      cursor: pointer;
      min-width: 120px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .course-cell:hover {
      background: #f0f6ff;
    }

    .course-cell.selected {
      outline: 3px solid #2563eb;
      outline-offset: -3px;
    }

    .course-cell.drag-preview {
      box-shadow: inset 0 0 0 9999px rgba(59, 130, 246, 0.18);
    }

    body.dark .course-cell.drag-preview {
      box-shadow: inset 0 0 0 9999px rgba(96, 165, 250, 0.22);
    }

    .course-name {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .course-info {
      font-size: 14px;
      color: #555;
      line-height: 1.4;
    }

    .empty {
      color: #bbb;
      font-size: 14px;
    }

    .hint {
      margin-top: 18px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    .modal-box {
      background: white;
    }
    .course-cell.drag-preview {
      box-shadow: inset 0 0 0 9999px rgba(59, 130, 246, 0.18);
    }

    body.dark .course-cell.drag-preview {
      box-shadow: inset 0 0 0 9999px rgba(96, 165, 250, 0.22);
    }

    body.dark {
      background: #0f172a;
      color: #e5e7eb;
    }

    body.dark .table-wrap,
    body.dark .semester-bar {
      background: #111827;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    body.dark th {
      background: #1e3a8a;
      color: #f9fafb;
    }

    body.dark th,
    body.dark td {
      border-color: #334155;
    }

    body.dark .time-col {
      background: #1f2937;
      color: #f3f4f6;
    }

    body.dark .subtitle,
    body.dark .hint,
    body.dark .semester-title,
    body.dark .course-info {
      color: #cbd5e1;
    }

    body.dark .empty {
      color: #64748b;
    }

    body.dark .course-cell {
      background: #0b1220;
    }

    body.dark .course-cell:hover {
      background: #172033;
    }

    body.dark .course-cell.selected {
      outline: 3px solid #60a5fa;
    }

    body.dark .modal-box {
      background: #111827;
      color: #e5e7eb;
    }

    body.dark #courseModal input {
      background: #0f172a;
      color: #f8fafc;
      border: 1px solid #475569;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 26px;
      }

      .course-cell {
        height: 80px;
      }
      .course-cell.drag-preview {
        box-shadow: inset 0 0 0 9999px rgba(59, 130, 246, 0.18);
  }

    body.dark .course-cell.drag-preview {
      box-shadow: inset 0 0 0 9999px rgba(96, 165, 250, 0.22);
    }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>我的課表</h1>
    <div class="subtitle">NCCU Semester Timetable</div>

    <div class="semester-bar">
      <div class="semester-title">目前學期管理</div>
      <div class="semester-controls">
        <select id="semesterSelect" onchange="changeSemester(this.value)"></select>
        <button onclick="addSemester()">新增學期</button>
        <button class="delete-btn" onclick="deleteSemester()">刪除目前學期</button>
      </div>
    </div>

    <div class="controls">
      <button onclick="fillSampleData()">載入範例課表</button>
      <button onclick="clearSchedule()">清空課表</button>
      <button onclick="exportImage()">匯出圖片</button>
      <button onclick="downloadJSON()">下載備份</button>
      <button onclick="toggleWeekend()">顯示 / 隱藏週末</button>
      <button onclick="document.getElementById('importFile').click()">匯入備份</button>
      <button onclick="toggleDarkMode()">深色模式</button>
      <input id="importFile" type="file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>

    <div class="table-wrap">
      <table id="scheduleTable">
        <thead>
          <tr id="tableHeadRow"></tr>
        </thead>
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>

    <div class="hint">
      點格子後會跳出編輯視窗；不同學期會各自保存不同課表。
    </div>
  </div>

  <div id="courseModal" onclick="clickModalBackground(event)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center; padding:20px;">
    <div class="modal-box" style="width:min(92vw, 420px); border-radius:16px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; margin-bottom:12px;">編輯課程</h3>
      <div id="modalSlotInfo" style="margin-bottom:14px; color:#555; font-size:14px;"></div>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <input id="modalCourseName" type="text" placeholder="課名" style="padding:10px 12px; border:1px solid #cfd8ea; border-radius:10px; font-size:15px;">
        <input id="modalCourseRoom" type="text" placeholder="教室" style="padding:10px 12px; border:1px solid #cfd8ea; border-radius:10px; font-size:15px;">
        <input id="modalCourseTeacher" type="text" placeholder="老師" style="padding:10px 12px; border:1px solid #cfd8ea; border-radius:10px; font-size:15px;">
        <input id="modalCourseColor" type="text" placeholder="顏色，例如 #bfdbfe" style="padding:10px 12px; border:1px solid #cfd8ea; border-radius:10px; font-size:15px;">

        <div style="display:flex; gap:10px; margin-top:2px; flex-wrap:wrap;">
          <div onclick="pickColor('#fbcfe8')" style="width:28px; height:28px; border-radius:999px; background:#fbcfe8; border:2px solid #ddd; cursor:pointer;"></div>
          <div onclick="pickColor('#bfdbfe')" style="width:28px; height:28px; border-radius:999px; background:#bfdbfe; border:2px solid #ddd; cursor:pointer;"></div>
          <div onclick="pickColor('#bbf7d0')" style="width:28px; height:28px; border-radius:999px; background:#bbf7d0; border:2px solid #ddd; cursor:pointer;"></div>
          <div onclick="pickColor('#fde68a')" style="width:28px; height:28px; border-radius:999px; background:#fde68a; border:2px solid #ddd; cursor:pointer;"></div>
          <div onclick="pickColor('#ddd6fe')" style="width:28px; height:28px; border-radius:999px; background:#ddd6fe; border:2px solid #ddd; cursor:pointer;"></div>
        </div>
      </div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:16px;">
        <button onclick="saveCourseFromModal()">儲存</button>
        <button onclick="deleteCourseFromModal()" style="background:#ef4444;">刪除</button>
        <button onclick="closeModal()" style="background:#64748b;">取消</button>
      </div>
    </div>
  </div>

  <script>
  function getDragRangeKeys(startKey, endKey) {
    if (!startKey || !endKey) return [];

    const [day1, p1] = startKey.split("-");
    const [day2, p2] = endKey.split("-");

    if (day1 !== day2) return [];

    const start = Math.min(Number(p1), Number(p2));
    const end = Math.max(Number(p1), Number(p2));

    const keys = [];
    for (let i = start; i <= end; i++) {
      keys.push(`${day1}-${i}`);
    }
    return keys;
}

function updateDragPreview() {
  dragPreviewKeys = getDragRangeKeys(dragStartKey, dragCurrentKey);
  initSchedule();
}

function beginPointerDrag(key) {
  isDragging = true;
  dragStartKey = key;
  dragCurrentKey = key;
  dragPreviewKeys = [key];
  dragFillKeys = [];
  pointerMoved = false;
  initSchedule();
}

function handlePointerMove(event) {
  if (!isDragging) return;

  const el = document.elementFromPoint(event.clientX, event.clientY);
  if (!el) return;

  const cell = el.closest("[data-key]");
  if (!cell) return;

  const key = cell.dataset.key;
  if (!key) return;

  if (key !== dragCurrentKey) {
    dragCurrentKey = key;
    pointerMoved = true;
    updateDragPreview();
  }
}

function handlePointerUp() {
  if (!isDragging) return;

  const rangeKeys = getDragRangeKeys(dragStartKey, dragCurrentKey);

  isDragging = false;
  dragPreviewKeys = [];

  if (!pointerMoved || rangeKeys.length <= 1) {
    const singleKey = dragStartKey;
    dragStartKey = null;
    dragCurrentKey = null;
    openModal(singleKey);
    return;
  }

  dragFillKeys = rangeKeys;
  const firstKey = rangeKeys[0];
  dragStartKey = null;
  dragCurrentKey = null;
  openModal(firstKey);
}
    function getDragRangeKeys(startKey, endKey) {
  if (!startKey || !endKey) return [];

  const [day1, p1] = startKey.split("-");
  const [day2, p2] = endKey.split("-");

  if (day1 !== day2) return [];

  const start = Math.min(Number(p1), Number(p2));
  const end = Math.max(Number(p1), Number(p2));

  const keys = [];
  for (let i = start; i <= end; i++) {
    keys.push(`${day1}-${i}`);
  }
  return keys;
}

function updateDragPreview() {
  dragPreviewKeys = getDragRangeKeys(dragStartKey, dragEndKey);
  initSchedule();
}

function startDrag(key) {
  isDragging = true;
  dragStartKey = key;
  dragEndKey = key;
  updateDragPreview();
}

function moveDrag(key) {
  if (!isDragging) return;
  dragEndKey = key;
  updateDragPreview();
}

function endDrag(key) {
  if (!isDragging) return;

  isDragging = false;
  dragEndKey = key;

  const rangeKeys = getDragRangeKeys(dragStartKey, dragEndKey);

  if (rangeKeys.length <= 1) {
    dragPreviewKeys = [];
    dragStartKey = null;
    dragEndKey = null;
    openModal(key);
    return;
  }

  dragFillKeys = rangeKeys;
  dragPreviewKeys = [];
  openModal(rangeKeys[0]);
  dragStartKey = null;
  dragEndKey = null;
}

function handleTouchMove(event) {
  if (!isDragging) return;

  const touch = event.touches[0];
  if (!touch) return;

  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  if (!el) return;

  const cell = el.closest("[data-key]");
  if (!cell) return;

  const key = cell.dataset.key;
  if (key) {
    moveDrag(key);
  }
}

function handleTouchEnd(event) {
  if (!isDragging) return;

  let key = dragEndKey || dragStartKey;

  const touch = event.changedTouches && event.changedTouches[0];
  if (touch) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const cell = el && el.closest("[data-key]");
    if (cell && cell.dataset.key) {
      key = cell.dataset.key;
    }
  }

  endDrag(key);

  document.removeEventListener("touchmove", handleTouchMove);
  document.removeEventListener("touchend", handleTouchEnd);
}
    const periods = [
      { label: "第1節", time: "08:10–09:00" },
      { label: "第2節", time: "09:10–10:00" },
      { label: "第3節", time: "10:20–11:10" },
      { label: "第4節", time: "11:20–12:10" },
      { label: "第5節", time: "13:10–14:00" },
      { label: "第6節", time: "14:10–15:00" },
      { label: "第7節", time: "15:10–16:00" },
      { label: "第8節", time: "16:10–17:00" }
    ];

    const dayLabels = {
      mon: "星期一",
      tue: "星期二",
      wed: "星期三",
      thu: "星期四",
      fri: "星期五",
      sat: "星期六",
      sun: "星期日"
    };

    const allDays = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];

    let showWeekend = JSON.parse(localStorage.getItem("showWeekend")) || false;

    let semesterList = JSON.parse(localStorage.getItem("semesterList")) || ["113-1"];
    let currentSemester = localStorage.getItem("currentSemester") || "113-1";

    if (!semesterList.includes(currentSemester)) {
      semesterList.push(currentSemester);
    }

    let scheduleData = JSON.parse(localStorage.getItem(`scheduleData_${currentSemester}`)) || {};
    let isDragging = false;
    let dragStartKey = null;
    let dragCurrentKey = null;
    let dragPreviewKeys = [];
    let dragFillKeys = [];
    let pointerMoved = false;

    function saveSemesterList() {
      localStorage.setItem("semesterList", JSON.stringify(semesterList));
      localStorage.setItem("currentSemester", currentSemester);
    }

    function loadCurrentSemesterData() {
      scheduleData = JSON.parse(localStorage.getItem(`scheduleData_${currentSemester}`)) || {};
    }

    function saveCurrentSemesterData() {
      localStorage.setItem(`scheduleData_${currentSemester}`, JSON.stringify(scheduleData));
    }

    function renderSemesterSelect() {
      const select = document.getElementById("semesterSelect");
      select.innerHTML = "";

      semesterList.forEach(semester => {
        const option = document.createElement("option");
        option.value = semester;
        option.textContent = semester;
        if (semester === currentSemester) option.selected = true;
        select.appendChild(option);
      });
    }

    function changeSemester(semester) {
      currentSemester = semester;
      saveSemesterList();
      loadCurrentSemesterData();
      closeModal();
      initSchedule();
    }

    function addSemester() {
      const newSemester = prompt("請輸入新學期名稱，例如：113-2");
      if (!newSemester) return;

      const trimmed = newSemester.trim();
      if (!trimmed) return;

      if (semesterList.includes(trimmed)) {
        alert("這個學期已經存在");
        return;
      }

      semesterList.push(trimmed);
      currentSemester = trimmed;
      scheduleData = {};

      saveSemesterList();
      saveCurrentSemesterData();
      renderSemesterSelect();
      closeModal();
      initSchedule();
    }

    function deleteSemester() {
      if (semesterList.length === 1) {
        alert("至少要保留一個學期");
        return;
      }

      const confirmDelete = confirm(`確定要刪除學期 ${currentSemester} 嗎？`);
      if (!confirmDelete) return;

      localStorage.removeItem(`scheduleData_${currentSemester}`);
      semesterList = semesterList.filter(s => s !== currentSemester);
      currentSemester = semesterList[0];

      saveSemesterList();
      loadCurrentSemesterData();
      renderSemesterSelect();
      closeModal();
      initSchedule();
    }

    function getVisibleDays() {
      return showWeekend ? allDays : allDays.slice(0, 5);
    }

    function toggleWeekend() {
      showWeekend = !showWeekend;
      localStorage.setItem("showWeekend", JSON.stringify(showWeekend));
      initSchedule();
    }

    function getAutoColor(courseName) {
      if (!courseName) return "#bfdbfe";

      if (courseName.includes("民法") || courseName.includes("法律") || courseName.includes("刑法")) {
        return "#fecdd3";
      }

      if (courseName.includes("哲學") || courseName.includes("倫理") || courseName.includes("邏輯")) {
        return "#ddd6fe";
      }

      if (courseName.includes("會計") || courseName.includes("經濟") || courseName.includes("統計")) {
        return "#fde68a";
      }

      if (courseName.includes("大腦") || courseName.includes("心理") || courseName.includes("科學")) {
        return "#bbf7d0";
      }

      return "#bfdbfe";
    }

    function applyDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true";
      document.body.classList.toggle("dark", isDark);
    }

    function toggleDarkMode() {
      const isDark = localStorage.getItem("darkMode") === "true";
      localStorage.setItem("darkMode", (!isDark).toString());
      applyDarkMode();
    }

    function renderTableHead(visibleDays) {
      const headRow = document.getElementById("tableHeadRow");
      headRow.innerHTML = "";

      const timeHead = document.createElement("th");
      timeHead.className = "time-col";
      timeHead.textContent = "節次";
      headRow.appendChild(timeHead);

      visibleDays.forEach(day => {
        const th = document.createElement("th");
        th.textContent = dayLabels[day];
        headRow.appendChild(th);
      });
    }

    function isSameCourse(a, b) {
      if (!a || !b) return false;

      return (
        a.name === b.name &&
        a.room === b.room &&
        a.teacher === b.teacher
      );
    }

    function getCourseSpan(day, startPeriod) {
      const current = scheduleData[`${day}-${startPeriod}`];
      if (!current) return 1;

      let span = 1;
      let nextPeriod = startPeriod + 1;

      while (nextPeriod <= periods.length) {
        const next = scheduleData[`${day}-${nextPeriod}`];
        if (isSameCourse(current, next)) {
          span++;
          nextPeriod++;
        } else {
          break;
        }
      }

      return span;
    }

    function initSchedule() {
      const visibleDays = getVisibleDays();
      renderSemesterSelect();
      renderTableHead(visibleDays);

      const tbody = document.getElementById("scheduleBody");
      tbody.innerHTML = "";

      const skippedCells = {};

      periods.forEach((period, rowIndex) => {
        const tr = document.createElement("tr");

        const timeTd = document.createElement("td");
        timeTd.className = "time-col";
        timeTd.innerHTML = `${period.label}<br><span style="font-size:12px; color:#666;">${period.time}</span>`;
        tr.appendChild(timeTd);

        visibleDays.forEach(day => {
          const periodNumber = rowIndex + 1;
          const key = `${day}-${periodNumber}`;

          if (skippedCells[key]) return;

          const td = document.createElement("td");
          td.className = "course-cell";
          td.dataset.key = key;

          td.onpointerdown = (event) => {
            event.preventDefault();
            beginPointerDrag(key);
          };

          if (selectedKey === key) {
            td.classList.add("selected");
          }
          if (dragPreviewKeys.includes(key)) {
            td.classList.add("drag-preview");
          }

          td.dataset.key = key;

          td.onmousedown = (event) => {
            event.preventDefault();
            startDrag(key);
          };

          td.onmouseenter = () => {
            moveDrag(key);
          };

          td.onmouseup = () => {
            endDrag(key);
          };

          td.ontouchstart = (event) => {
            event.preventDefault();
            startDrag(key);
            document.addEventListener("touchmove", handleTouchMove, { passive: false });
            document.addEventListener("touchend", handleTouchEnd, { passive: false });
          };

          const currentCourse = scheduleData[key];

          if (currentCourse) {
            const span = getCourseSpan(day, periodNumber);

            if (span > 1) {
              td.rowSpan = span;
              for (let i = 1; i < span; i++) {
                skippedCells[`${day}-${periodNumber + i}`] = true;
              }
            }

            td.style.background = currentCourse.color || "#bfdbfe";
            td.innerHTML = `
              <div class="course-name">${currentCourse.name}</div>
              <div class="course-info">
                ${currentCourse.room || ""}<br>
                ${currentCourse.teacher || ""}
              </div>
            `;
          } else {
            td.style.background = "";
            td.innerHTML = `<div class="empty">－</div>`;
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    function openModal(key) {
      selectedKey = key;

      const data = scheduleData[key] || {};
      const [day, period] = key.split("-");

      document.getElementById("modalSlotInfo").textContent =
        `${currentSemester}｜${dayLabels[day]} 第${period}節`;

      document.getElementById("modalCourseName").value = data.name || "";
      document.getElementById("modalCourseRoom").value = data.room || "";
      document.getElementById("modalCourseTeacher").value = data.teacher || "";
      document.getElementById("modalCourseColor").value = data.color || getAutoColor(data.name || "");

      document.getElementById("courseModal").style.display = "flex";
      initSchedule();
    }

    function closeModal() {
      document.getElementById("courseModal").style.display = "none";
      selectedKey = null;
      dragFillKeys = [];
      dragPreviewKeys = [];
      isDragging = false;
      dragStartKey = null;
      dragCurrentKey = null;
      pointerMoved = false;
      initSchedule();
    }

    function clickModalBackground(event) {
      if (event.target.id === "courseModal") {
        closeModal();
      }
    }

    function pickColor(color) {
      document.getElementById("modalCourseColor").value = color;
    }

    function saveCourseFromModal() {if (dragFillKeys.length > 0) {
  dragFillKeys.forEach(key => {
    scheduleData[key] = {
      name,
      room,
      teacher,
      color
    };
  });
} else {
  scheduleData[selectedKey] = {
    name,
    room,
    teacher,
    color
  };
}}

    function exportImage() {
      const target = document.querySelector(".table-wrap");

      html2canvas(target).then(canvas => {
        const link = document.createElement("a");
        link.download = `${currentSemester}_我的課表.png`;
        link.href = canvas.toDataURL();
        link.click();
      });
    }

    function downloadJSON() {
      const backupData = {
        semesterList,
        currentSemester,
        schedules: {}
      };

      semesterList.forEach(semester => {
        backupData.schedules[semester] =
          JSON.parse(localStorage.getItem(`scheduleData_${semester}`)) || {};
      });

      const dataStr = JSON.stringify(backupData, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "schedule-backup.json";
      link.click();

      URL.revokeObjectURL(url);
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);

          if (importedData.semesterList && importedData.schedules) {
            semesterList = importedData.semesterList;
            currentSemester = importedData.currentSemester || semesterList[0];

            semesterList.forEach(semester => {
              localStorage.setItem(
                `scheduleData_${semester}`,
                JSON.stringify(importedData.schedules[semester] || {})
              );
            });

            saveSemesterList();
            loadCurrentSemesterData();
          } else {
            scheduleData = importedData;
            saveCurrentSemesterData();
          }

          closeModal();
          initSchedule();
          alert("匯入成功");
        } catch (error) {
          alert("JSON 格式錯誤，匯入失敗");
        }
      };

      reader.readAsText(file);
    }

    document.addEventListener("pointermove", handlePointerMove);
    document.addEventListener("pointerup", handlePointerUp);
